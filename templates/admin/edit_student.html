<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCS Admin | Edit Student</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <nav>
    <div class="nav-left">
      <img src="{{ url_for('static', filename='uclogo.png') }}" alt="UC" class="nav-logo" />
      <img src="{{ url_for('static', filename='ccsmainlogo.png') }}" alt="CCS" class="nav-logo" />
      <span class="nav-title">College of Computer Studies Admin</span>
    </div>
    <ul class="nav-links">
      <li><a href="{{ url_for('admin_home') }}">Home</a></li>
      <li><a href="{{ url_for('admin_search') }}">Search</a></li>
      <li><a href="{{ url_for('admin_students') }}" class="active">Students</a></li>
      <li><a href="{{ url_for('admin_sitin') }}">Sit-in</a></li>
      <li><a href="{{ url_for('admin_sitin_records') }}">View Sit-in Records</a></li>
      <li><a href="{{ url_for('admin_reports') }}">Sit-in Reports</a></li>
      <li><a href="{{ url_for('admin_feedback') }}">Feedback Reports</a></li>
      <li><a href="{{ url_for('admin_reservation') }}">Reservation</a></li>
      <li><a href="{{ url_for('logout') }}" class="btn-nav-logout">Log out</a></li>
    </ul>
  </nav>

  <main class="auth-main">
    <div class="split-card">
      <div class="split-left">
        <div class="split-logo-circle">
          <img src="{{ url_for('static', filename='ccsmainlogo.png') }}" alt="CCS" />
        </div>
        <h2 class="split-title">Edit Student</h2>
        <p class="split-desc">Update the student's information below.</p>
      </div>
      <div class="split-right">
        <h2 class="form-title">Edit Student Info</h2>
        <form method="POST">
          <div class="name-row">
            <div class="flat-field">
              <label>ID Number</label>
              <input type="text" name="idnum" value="{{ student['idnum'] }}" required />
            </div>
            <div class="flat-field">
              <label>Remaining Sessions</label>
              <input type="number" name="sessions" value="{{ student['sessions'] }}" required />
            </div>
          </div>
          <div class="name-row">
            <div class="flat-field">
              <label>Last Name</label>
              <input type="text" name="lastname" value="{{ student['lastname'] }}" required />
            </div>
            <div class="flat-field">
              <label>First Name</label>
              <input type="text" name="firstname" value="{{ student['firstname'] }}" required />
            </div>
          </div>
          <div class="flat-field">
            <label>Middle Name <span class="optional">(optional)</span></label>
            <input type="text" name="midname" value="{{ student['midname'] }}" />
          </div>
          <div class="flat-field">
            <label>Email</label>
            <input type="email" name="email" value="{{ student['email'] }}" required />
          </div>
          <div class="name-row">
            <div class="flat-field">
              <label>Course</label>
              <select name="course">
                <option {% if student['course'] == 'BSIT' %}selected{% endif %}>BSIT</option>
                <option {% if student['course'] == 'BSCS' %}selected{% endif %}>BSCS</option>
                <option {% if student['course'] == 'BSIS' %}selected{% endif %}>BSIS</option>
                <option {% if student['course'] == 'ACT'  %}selected{% endif %}>ACT</option>
              </select>
            </div>
            <div class="flat-field">
              <label>Year Level</label>
              <select name="level">
                <option {% if student['level'] == '1st Year' %}selected{% endif %}>1st Year</option>
                <option {% if student['level'] == '2nd Year' %}selected{% endif %}>2nd Year</option>
                <option {% if student['level'] == '3rd Year' %}selected{% endif %}>3rd Year</option>
                <option {% if student['level'] == '4th Year' %}selected{% endif %}>4th Year</option>
              </select>
            </div>
          </div>
          <div class="flat-field">
            <label>Address</label>
            <input type="text" name="address" value="{{ student['address'] }}" required />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-create">Save Changes</button>
            <a href="{{ url_for('admin_students') }}" class="btn-already">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </main>

</body>
</html>
