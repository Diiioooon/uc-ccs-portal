<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCS | About</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <nav>
    <div class="nav-left">
      <img src="{{ url_for('static', filename='uclogo.png') }}" alt="UC" class="nav-logo" />
      <img src="{{ url_for('static', filename='ccsmainlogo.png') }}" alt="CCS" class="nav-logo" />
      <span class="nav-title">College of Computer Studies Sit-in Monitoring System</span>
    </div>
    <ul class="nav-links">
      <li><a href="{{ url_for('home') }}">Home</a></li>
      <li><a href="{{ url_for('community') }}">Community</a></li>
      <li><a href="{{ url_for('about') }}" class="active">About</a></li>
      {% if session.get('user_id') %}
        <li><a href="{{ url_for('logout') }}" class="btn-nav-logout">Log out</a></li>
      {% else %}
        <li><a href="{{ url_for('login') }}">Login</a></li>
        <li><a href="{{ url_for('register') }}" class="btn-nav-register">Register</a></li>
      {% endif %}
    </ul>
  </nav>

  <main class="page-main">
    <div class="page-placeholder">
      <h2>About</h2>
      <p>Content coming soon.</p>
    </div>
  </main>

  <footer>&copy; 2026 University of Cebu — College of Computer Studies</footer>

</body>
</html>
